<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#101113">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Claude Monitor">
  <title>Claude Usage Monitor</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>Claude Usage Monitor</h1>
        <p id="summary">Waiting for first refresh</p>
      </div>
      <div class="actions">
        <button id="refreshButton" class="primary" type="button">Refresh</button>
        <button id="powerButton" type="button">Display</button>
      </div>
    </header>

    <section class="controls" aria-label="LCD controls">
      <span>LCD screen</span>
      <div class="segments" id="modeControls">
        <button data-mode="AUTO" type="button">Auto</button>
        <button data-mode="FIVE" type="button">5-hour</button>
        <button data-mode="WEEK" type="button">Week</button>
        <button data-mode="CLOCK" type="button">Clock</button>
        <button data-mode="STATUS" type="button">Status</button>
        <button data-mode="SYS" type="button">System</button>
      </div>
    </section>

    <section class="meters" aria-label="Usage meters">
      <article class="meter">
        <div class="meter-head">
          <span>5-hour</span>
          <strong id="fivePercent">--%</strong>
        </div>
        <div class="bar"><span id="fiveBar"></span></div>
        <p id="fiveLeft">-- left</p>
      </article>
      <article class="meter">
        <div class="meter-head">
          <span>Week</span>
          <strong id="weekPercent">--%</strong>
        </div>
        <div class="bar"><span id="weekBar"></span></div>
        <p id="weekLeft">-- left</p>
      </article>
    </section>

    <section class="grid" aria-label="System status">
      <article><span>Last refresh</span><strong id="lastRefresh">--</strong></article>
      <article><span>API latency</span><strong id="latency">--</strong></article>
      <article><span>Pi uptime</span><strong id="uptime">--</strong></article>
      <article><span>Arduino</span><strong id="arduino">--</strong></article>
      <article><span>OAuth</span><strong id="oauth">--</strong></article>
      <article><span>Internet</span><strong id="internet">--</strong></article>
      <article><span>LCD state</span><strong id="lcdState">--</strong></article>
      <article><span>Trend</span><strong id="trend">--</strong></article>
    </section>

    <section class="charts" aria-label="Usage history">
      <article>
        <div class="chart-head"><span>24 hours</span><strong id="peak">Peak --%</strong></div>
        <canvas id="chart24" height="180"></canvas>
      </article>
      <article>
        <div class="chart-head"><span>7 days</span><strong id="average">Avg --%</strong></div>
        <canvas id="chart7" height="180"></canvas>
      </article>
    </section>

    <p class="error" id="error"></p>

    <details class="panel-details" id="settingsDetails">
      <summary>Display settings</summary>
      <form id="settingsForm" class="settings-form" novalidate>
        <label>
          <span>Warning threshold (%)</span>
          <input type="number" id="settingWarnThreshold" min="1" max="99" step="1">
        </label>
        <label>
          <span>API refresh interval (s)</span>
          <input type="number" id="settingRefreshSeconds" min="10" max="3600" step="10">
        </label>
        <label>
          <span>Mark stale after (s)</span>
          <input type="number" id="settingStaleSeconds" min="60" max="86400" step="60">
        </label>
        <div class="settings-actions">
          <button type="submit" class="primary">Save</button>
          <span id="settingsFeedback" class="feedback"></span>
        </div>
      </form>
    </details>

    <details class="panel-details" id="sysinfoDetails">
      <summary>System info</summary>
      <div class="sysinfo-panel">
        <p class="sys-preview" id="sysPreview">--</p>
        <ul id="sysMetricList" class="sys-metric-list"></ul>
        <div class="settings-actions">
          <button type="button" id="sysinfoSave" class="primary">Save</button>
          <span id="sysinfoFeedback" class="feedback"></span>
        </div>
      </div>
    </details>

    <details class="panel-details" id="logsDetails">
      <summary>Logs</summary>
      <div class="logs-toolbar">
        <label class="check-label">
          <input type="checkbox" id="logAutoScroll" checked>
          Auto-scroll
        </label>
        <button type="button" id="clearLogs" class="small">Clear</button>
      </div>
      <ol id="logsList" class="logs-list" reversed></ol>
    </details>
  </main>
  <script src="/app.js"></script>
</body>
</html>
